# MuJoCo / SO-ARM101 environment config
# Use with: python demo.py --backend mujoco --stage 3 --prompt "Banana"
backend: mujoco
n_objects: 1
n_grasp_attempts: 5
n_action_attempts: 2
finger_length: 0.04

# grasp_mode controls how the SO-ARM attempts to pick up objects.
#
#   physics     — real MuJoCo contact detection and lift verification.
#                 Use for ALL benchmark runs and world-model label generation.
#                 (The SO-ARM moving jaw cannot physically contact table-level
#                 objects in a top-down approach, so success rate is honestly 0 %
#                 with the current hardware config.)
#
#   demo_attach — kinematic sticky-gripper: snaps the target object below the
#                 EEF after close.  Looks correct on video but the success
#                 signal is synthetic.  Use ONLY for semantic demo recordings.
#                 DO NOT use for benchmarks or training label generation.
grasp_mode: physics

# Camera: matches _MockCamera defaults in env_soarm.py (overhead, 224x224)
camera:
  center_x: 0.05
  center_y: -0.52
  center_z: 1.9
  target_x: 0.05
  target_y: -0.52
  target_z: 0.785
  znear: 0.01
  zfar: 10.0
  img_size: 224
  fov: 55.0

policy:
  config_path: './config/pyb/OWG.yaml'
  verbose: true
  vis: false
  use_grasp_ranker: false   # set true for Stage 4
  enable_semantic: false
  enable_grasp_sampling: false

seed: 42
